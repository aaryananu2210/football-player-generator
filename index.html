<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Football Player Generator ⚽</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <h1 class="main-title">
        Random Football Player Generator
    </h1>

    <div class="container">

        <h2 id="title">
            Pick a Player
        </h2>

        <img
        id="playerimg"
        src="footbalimags/default.jpg"
        alt="player">

        <p id="club"></p>
        <p id="position"></p>
        <p id="rating"></p>

        <button id="btn">
            Random Player
        </button>

    </div>

    <script src="script.js"></script>

</body>
</html>
